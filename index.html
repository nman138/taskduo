<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TaskDuo">
<meta name="theme-color" content="#0f0f1a">
<title>TaskDuo</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f0f1a; --card:#1a1a2e; --card2:#16213e;
    --pink:#ff6b9d; --teal:#00d4aa;
    --pink-dim:rgba(255,107,157,0.15); --teal-dim:rgba(0,212,170,0.15);
    --text:#f0f0f5; --dim:#8888aa;
    --border:rgba(255,255,255,0.07); --shadow:0 8px 32px rgba(0,0,0,0.4);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}
  body::before{content:'';position:fixed;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(255,107,157,0.08),transparent 70%);pointer-events:none;z-index:0}
  body::after{content:'';position:fixed;bottom:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(0,212,170,0.08),transparent 70%);pointer-events:none;z-index:0}
  .screen{display:none;min-height:100dvh;position:relative;z-index:1;flex-direction:column}
  .screen.active{display:flex}

  #who{align-items:center;justify-content:center;padding:40px 24px}
  .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:3rem;letter-spacing:-1px;margin-bottom:6px}
  .logo .p{color:var(--pink)}.logo .t{color:var(--teal)}
  .tagline{color:var(--dim);font-size:.9rem;margin-bottom:48px;text-align:center}
  .who-label{font-family:'Syne',sans-serif;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);margin-bottom:18px}
  .who-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:340px}
  .who-btn{padding:26px 12px;border-radius:20px;border:2px solid var(--border);background:var(--card);color:var(--dim);font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:8px}
  .who-btn .ic{font-size:2.2rem}
  .who-btn.pink{border-color:var(--pink);color:var(--pink);background:var(--pink-dim)}
  .who-btn.teal{border-color:var(--teal);color:var(--teal);background:var(--teal-dim)}
  .who-btn:active{transform:scale(.96)}
  .go-btn{margin-top:28px;width:100%;max-width:340px;padding:16px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--teal),#00a896);color:#0f0f1a;font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;transition:all .2s}
  .go-btn:active{transform:scale(.97);opacity:.9}

  .app-hdr{padding:52px 22px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:linear-gradient(to bottom,var(--bg) 80%,transparent);z-index:10}
  .app-hdr h1{font-family:'Syne',sans-serif;font-size:1.45rem;font-weight:800}
  .app-hdr .sub{font-size:.8rem;color:var(--dim);margin-top:2px}
  .pill{padding:5px 13px;border-radius:20px;font-family:'Syne',sans-serif;font-size:.75rem;font-weight:700}
  .pill.pink{background:var(--pink-dim);color:var(--pink);border:1px solid rgba(255,107,157,.3)}
  .pill.teal{background:var(--teal-dim);color:var(--teal);border:1px solid rgba(0,212,170,.3)}
  .app-body{padding:0 18px 110px;flex:1}

  .add-box{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:22px;box-shadow:var(--shadow)}
  .add-box textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:11px;padding:11px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;line-height:1.5;resize:none;outline:none;min-height:80px;margin-bottom:10px;transition:border-color .2s;-webkit-user-select:text;user-select:text;display:block}
  .add-box textarea:focus{border-color:var(--pink)}
  .add-box textarea::placeholder{color:var(--dim)}
  .send-btn{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--pink),#e0507a);color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:.92rem;cursor:pointer}
  .send-btn:active{transform:scale(.97)}

  .notif-banner{background:rgba(0,212,170,0.1);border:1px solid rgba(0,212,170,0.25);border-radius:12px;padding:12px 14px;margin-bottom:16px;font-size:.83rem;color:var(--teal);display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:500}
  .notif-banner:active{opacity:.8}

  .sec-label{font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);margin:22px 0 10px;display:flex;align-items:center;justify-content:space-between}
  .clear-btn{font-family:'Syne',sans-serif;font-size:.7rem;font-weight:700;color:#ff4466;background:rgba(255,68,102,0.1);border:1px solid rgba(255,68,102,0.2);border-radius:8px;padding:4px 10px;cursor:pointer}

  .task-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:15px 16px;margin-bottom:10px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .task-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--pink);border-radius:3px 0 0 3px}
  .task-card.done::before{background:var(--teal)}
  .task-card.done{opacity:.7}
  .task-txt{font-size:.93rem;line-height:1.5;margin-bottom:7px}
  .task-card.done .task-txt{text-decoration:line-through;color:var(--dim)}
  .task-meta{font-size:.73rem;color:var(--dim);margin-bottom:9px}
  .task-actions{display:flex;gap:8px;align-items:center}

  /* Big done button */
  .done-btn{flex:1;padding:11px 12px;border-radius:11px;border:1px solid rgba(0,212,170,.3);background:var(--teal-dim);color:var(--teal);font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;cursor:pointer}
  .done-btn:active{transform:scale(.96)}
  /* Done with photo button */
  .done-photo-btn{flex:1;padding:11px 12px;border-radius:11px;border:1px solid rgba(0,212,170,.5);background:linear-gradient(135deg,rgba(0,212,170,0.2),rgba(0,212,170,0.1));color:var(--teal);font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;cursor:pointer}
  .done-photo-btn:active{transform:scale(.96)}

  .del-btn{padding:11px 12px;border-radius:11px;border:1px solid rgba(255,68,102,0.2);background:rgba(255,68,102,0.08);color:#ff4466;font-size:.82rem;cursor:pointer}

  .task-photo{width:100%;border-radius:10px;margin-top:10px;max-height:240px;object-fit:cover;border:1px solid rgba(0,212,170,0.2)}
  .photo-label{font-size:.73rem;color:var(--teal);margin-top:6px;display:flex;align-items:center;gap:4px}

  .done-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;background:var(--teal-dim);color:var(--teal);font-size:.72rem;font-family:'Syne',sans-serif;font-weight:700}
  .empty{text-align:center;padding:52px 20px;color:var(--dim)}
  .empty .em{font-size:3rem;margin-bottom:12px}
  .empty p{font-size:.88rem;line-height:1.7}
  .switch-lnk{text-align:center;padding:14px;font-size:.8rem;color:var(--dim);cursor:pointer}
  .switch-lnk span{color:var(--teal);text-decoration:underline}
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:11px 20px;font-size:.86rem;color:var(--text);box-shadow:var(--shadow);z-index:100;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .spin-wrap{display:flex;align-items:center;justify-content:center;gap:10px;padding:48px;color:var(--dim);font-size:.9rem}
  .spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  input[type=file]{display:none}
</style>
</head>
<body>

<div id="who" class="screen active">
  <div class="logo"><span class="p">Task</span><span class="t">Duo</span></div>
  <p class="tagline">Shared tasks, done together 💑</p>
  <p class="who-label">Who are you?</p>
  <div class="who-grid">
    <button class="who-btn" id="btn-sarah" onclick="selectWho('sarah')">
      <span class="ic">👩</span>Sarah
    </button>
    <button class="who-btn" id="btn-user" onclick="selectWho('user')">
      <span class="ic">👨</span>Justin
    </button>
  </div>
  <button class="go-btn" onclick="goToApp()">Let's Go →</button>
</div>

<div id="app" class="screen">
  <div class="app-hdr">
    <div><h1 id="hdr-title">TaskDuo</h1><div class="sub" id="hdr-sub"></div></div>
    <div class="pill" id="hdr-pill"></div>
  </div>

  <div id="add-box-wrap" style="padding:0 18px;display:none">
    <div class="add-box">
      <textarea id="new-txt" placeholder="What do you need Justin to do?"></textarea>
      <button class="send-btn" onclick="addTask()">📤 Send Task</button>
    </div>
  </div>

  <div class="app-body" id="app-body">
    <div class="spin-wrap"><div class="spinner"></div> Connecting...</div>
  </div>
  <div class="switch-lnk" onclick="switchUser()">Not you? <span>Switch user</span></div>
</div>

<div class="toast" id="toast"></div>
<!-- Two separate file inputs: one for done+photo, one for adding photo after -->
<input type="file" id="photo-done-input" accept="image/*" capture="environment">
<input type="file" id="photo-add-input"  accept="image/*" capture="environment">

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
  var DB_URL       = 'https://taskduo-3b772-default-rtdb.firebaseio.com';
  var EJS_SERVICE  = 'service_97pzoux';
  var EJS_TEMPLATE = 'template_sjv0e9b';
  var EJS_PUBLIC   = '0LF9FTU6YUxsNc5Ma';

  emailjs.init(EJS_PUBLIC);

  var currentUser     = null;
  var pendingDoneId   = null; // task to mark done + attach photo
  var pendingAddPhoto = null; // task to just add photo to
  var pollTimer       = null;
  var currentData     = {};
  var isTyping        = false;
  var lastTaskSnapshot = null;

  document.getElementById('new-txt').addEventListener('focus', function(){ isTyping = true; });
  document.getElementById('new-txt').addEventListener('blur',  function(){ isTyping = false; });

  // ── Notifications ──
  function requestNotifPermission() {
    if (!('Notification' in window)) { toast('❌ Notifications not supported in this browser'); return; }
    Notification.requestPermission().then(function(p){
      if (p === 'granted') toast('🔔 Notifications ON!');
      else toast('❌ Notifications blocked — allow in Chrome settings');
      fetchTasks(); // re-render to hide banner
    });
  }

  function sendNotif(title, body) {
    if ('Notification' in window && Notification.permission === 'granted') {
      try { new Notification(title, { body:body }); } catch(e){}
    }
  }

  // ── Auto login ──
  var saved = localStorage.getItem('td_who');
  if (saved) { currentUser = saved; showScreen('app'); setupUI(); startPolling(); }

  function selectWho(who) {
    currentUser = who;
    document.getElementById('btn-sarah').className = 'who-btn' + (who==='sarah'?' pink':'');
    document.getElementById('btn-user').className  = 'who-btn' + (who==='user'?' teal':'');
  }

  function goToApp() {
    if (!currentUser) { toast('👆 Tap who you are first!'); return; }
    localStorage.setItem('td_who', currentUser);
    showScreen('app');
    setupUI();
    startPolling();
  }

  function setupUI() {
    var s = currentUser === 'sarah';
    document.getElementById('hdr-title').textContent = s ? "Sarah's Tasks" : 'My Tasks';
    document.getElementById('hdr-sub').textContent   = s ? 'Add tasks for Justin' : 'Tasks from Sarah';
    var p = document.getElementById('hdr-pill');
    p.textContent = s ? 'Sarah 👩' : 'Justin 👨';
    p.className   = 'pill ' + (s ? 'pink' : 'teal');
    document.getElementById('add-box-wrap').style.display = s ? 'block' : 'none';
  }

  function startPolling() {
    fetchTasks();
    pollTimer = setInterval(fetchTasks, 3000);
  }

  function fetchTasks() {
    fetch(DB_URL + '/tasks.json')
      .then(function(r){ return r.json(); })
      .then(function(data){
        if (isTyping) return;

        // Detect new tasks → notify Justin
        if (currentUser === 'user' && data && lastTaskSnapshot) {
          Object.keys(data).forEach(function(id){
            if (!lastTaskSnapshot[id] && !data[id].done) {
              sendNotif('📋 New Task from Sarah!', data[id].text);
            }
          });
        }

        // Detect completions → notify Sarah
        if (currentUser === 'sarah' && data && lastTaskSnapshot) {
          Object.keys(data).forEach(function(id){
            if (lastTaskSnapshot[id] && !lastTaskSnapshot[id].done && data[id].done) {
              sendNotif('✅ Justin finished a task!', data[id].text);
            }
          });
        }

        lastTaskSnapshot = {};
        if (data) Object.keys(data).forEach(function(id){
          lastTaskSnapshot[id] = { done: !!data[id].done };
        });

        renderTasks(data);
      }).catch(function(){});
  }

  function dbPost(data)       { return fetch(DB_URL+'/tasks.json',          {method:'POST',  body:JSON.stringify(data)}); }
  function dbPatch(id, data)  { return fetch(DB_URL+'/tasks/'+id+'.json',   {method:'PATCH', body:JSON.stringify(data)}); }
  function dbDelete(id)       { return fetch(DB_URL+'/tasks/'+id+'.json',   {method:'DELETE'}); }
  function dbDeleteAllDone()  {
    return Promise.all(Object.keys(currentData).filter(function(id){ return currentData[id].done; }).map(dbDelete));
  }

  function renderTasks(data) {
    currentData = data || {};
    var s = currentUser === 'sarah';
    var pending = [], done = [];

    if (data && typeof data === 'object') {
      Object.keys(data).forEach(function(id){
        var t = data[id]; t.id = id;
        (t.done ? done : pending).push(t);
      });
      pending.sort(function(a,b){ return (b.createdAt||0)-(a.createdAt||0); });
      done.sort(function(a,b){    return (b.doneAt||0)-(a.doneAt||0); });
    }

    var h = '';

    // Notification prompt banner
    if ('Notification' in window && Notification.permission === 'default') {
      h += '<div class="notif-banner" onclick="requestNotifPermission()">🔔 Tap here to enable notifications</div>';
    }

    if (!pending.length && !done.length) {
      h += '<div class="empty"><div class="em">'+(s?'✍️':'🎉')+'</div><p>'+
           (s ? 'No tasks yet.<br>Add one above!' : "Nothing to do!<br>Sarah hasn't added any tasks yet.")+
           '</p></div>';
    } else {
      if (pending.length) {
        h += '<div class="sec-label"><span>To Do ('+pending.length+')</span></div>';
        pending.forEach(function(t){
          var d = t.createdAt ? new Date(t.createdAt).toLocaleString('en-CA',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
          h += '<div class="task-card">'+
               '<div class="task-txt">'+esc(t.text)+'</div>'+
               '<div class="task-meta">Added '+d+'</div>'+
               '<div class="task-actions">';
          if (!s) {
            h += '<button class="done-btn"       onclick="markDoneNoPhoto(\''+t.id+'\',\''+esc(t.text)+'\')">✅ Done</button>'+
                 '<button class="done-photo-btn" onclick="markDoneWithPhoto(\''+t.id+'\',\''+esc(t.text)+'\')">✅📷 Done + Photo</button>';
          } else {
            h += '<span style="flex:1;font-size:.73rem;color:var(--pink)">⏳ Waiting for Justin...</span>';
          }
          h += '<button class="del-btn" onclick="confirmDelete(\''+t.id+'\')">🗑️</button>'+
               '</div></div>';
        });
      }

      if (done.length) {
        h += '<div class="sec-label" style="margin-top:26px">'+
             '<span>Completed ✓ ('+done.length+')</span>'+
             '<button class="clear-btn" onclick="clearAllDone()">🗑️ Clear All</button>'+
             '</div>';
        done.slice(0,20).forEach(function(t){
          var d = t.doneAt ? new Date(t.doneAt).toLocaleString('en-CA',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
          h += '<div class="task-card done">'+
               '<div class="task-txt">'+esc(t.text)+'</div>';
          if (t.photoUrl) {
            h += '<img src="'+t.photoUrl+'" class="task-photo" alt="Proof photo">'+
                 '<div class="photo-label">📷 Proof photo</div>';
          }
          h += '<div class="task-actions" style="margin-top:8px">'+
               '<span class="done-badge">✓ Done '+d+'</span>'+
               '<button class="del-btn" onclick="confirmDelete(\''+t.id+'\')">🗑️</button>'+
               '</div></div>';
        });
      }
    }

    document.getElementById('app-body').innerHTML = h;
  }

  function addTask() {
    var el = document.getElementById('new-txt');
    var txt = el.value.trim();
    if (!txt) { toast('✏️ Write a task first!'); return; }
    isTyping = false;
    dbPost({ text:txt, done:false, createdAt:Date.now(), createdBy:'sarah' })
      .then(function(){ el.value=''; toast('📤 Task sent to Justin!'); fetchTasks(); });
  }

  // Done WITHOUT photo
  function markDoneNoPhoto(id, taskText) {
    var now = Date.now();
    var doneAt = new Date(now).toLocaleString('en-CA',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    dbPatch(id, { done:true, doneAt:now }).then(function(){
      toast('🎉 Done! Emailing Sarah...');
      fetchTasks();
      emailjs.send(EJS_SERVICE, EJS_TEMPLATE, { task_name:taskText, completed_at:doneAt })
        .then(function(){ toast('📧 Sarah notified!'); })
        .catch(function(){ toast('✅ Marked done!'); });
    });
  }

  // Done WITH photo — opens camera first, then marks done
  function markDoneWithPhoto(id, taskText) {
    pendingDoneId = { id:id, text:taskText };
    document.getElementById('photo-done-input').click();
  }

  // Photo done input handler
  document.getElementById('photo-done-input').addEventListener('change', function(e){
    var file = e.target.files[0];
    if (!file || !pendingDoneId) return;
    toast('📷 Saving photo...');
    var r = new FileReader();
    r.onload = function(ev){
      var now = Date.now();
      var doneAt = new Date(now).toLocaleString('en-CA',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
      dbPatch(pendingDoneId.id, { done:true, doneAt:now, photoUrl:ev.target.result })
        .then(function(){
          toast('✅📷 Done with photo! Emailing Sarah...');
          fetchTasks();
          emailjs.send(EJS_SERVICE, EJS_TEMPLATE, { task_name:pendingDoneId.text, completed_at:doneAt })
            .then(function(){ toast('📧 Sarah notified!'); })
            .catch(function(){ toast('✅ Done with photo!'); });
          pendingDoneId = null;
        });
    };
    r.readAsDataURL(file);
    e.target.value = '';
  });

  function confirmDelete(id) {
    if (confirm('Delete this task?')) {
      dbDelete(id).then(function(){ toast('🗑️ Deleted!'); fetchTasks(); });
    }
  }

  function clearAllDone() {
    if (confirm('Clear all completed tasks?')) {
      dbDeleteAllDone().then(function(){ toast('🗑️ Cleared!'); fetchTasks(); });
    }
  }

  function switchUser() {
    localStorage.removeItem('td_who');
    currentUser = null; lastTaskSnapshot = null;
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    showScreen('who');
    document.getElementById('btn-sarah').className = 'who-btn';
    document.getElementById('btn-user').className  = 'who-btn';
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
  }

  function toast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 3000);
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
</script>
</body>
</html>
